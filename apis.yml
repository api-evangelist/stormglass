aid: stormglass
name: Stormglass
description: >-
  Stormglass provides a global marine and weather API delivering high-resolution
  forecasts, historical data, and environmental measurements for any coordinate
  on Earth. The platform aggregates data from multiple authoritative sources
  including NOAA, ECMWF, DWD, and others to provide weather point forecasts,
  marine data, tidal information, solar and astronomical data, biological
  oceanographic data, and elevation/bathymetry data. Used widely for maritime
  navigation, renewable energy forecasting, outdoor activity planning, and
  environmental monitoring applications.
