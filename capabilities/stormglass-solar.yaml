naftiko: 1.0.0-alpha2
info:
  label: Stormglass API — Solar
  description: 'Stormglass API — Solar. 1 operations. Lead operation: Get Solar Point Data. Self-contained Naftiko capability
    covering one Stormglass business surface.'
  tags:
  - Stormglass
  - Solar
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    STORMGLASS_API_KEY: STORMGLASS_API_KEY
capability:
  consumes:
  - type: http
    namespace: stormglass-solar
    baseUri: https://api.stormglass.io/v2
    description: Stormglass API — Solar business capability. Self-contained, no shared references.
    resources:
    - name: solar-point
      path: /solar/point
      operations:
      - name: getsolarpoint
        method: GET
        description: Get Solar Point Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: lat
          in: query
          type: number
          description: Latitude of the desired coordinate
          required: true
        - name: lng
          in: query
          type: number
          description: Longitude of the desired coordinate
          required: true
        - name: params
          in: query
          type: string
          description: Comma-separated list of solar parameters. E.g. uvIndex,downwardShortWaveRadiationFlux
          required: true
        - name: start
          in: query
          type: string
          description: Timestamp in UTC for first data hour
        - name: end
          in: query
          type: string
          description: Timestamp in UTC for last data hour
        - name: source
          in: query
          type: string
          description: Specify a single source or comma-separated list of sources
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.STORMGLASS_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: stormglass-solar-rest
    port: 8080
    description: REST adapter for Stormglass API — Solar. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/solar/point
      name: solar-point
      description: REST surface for solar-point.
      operations:
      - method: GET
        name: getsolarpoint
        description: Get Solar Point Data
        call: stormglass-solar.getsolarpoint
        with:
          lat: rest.lat
          lng: rest.lng
          params: rest.params
          start: rest.start
          end: rest.end
          source: rest.source
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: stormglass-solar-mcp
    port: 9090
    transport: http
    description: MCP adapter for Stormglass API — Solar. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-solar-point-data
      description: Get Solar Point Data
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stormglass-solar.getsolarpoint
      with:
        lat: tools.lat
        lng: tools.lng
        params: tools.params
        start: tools.start
        end: tools.end
        source: tools.source
      outputParameters:
      - type: object
        mapping: $.
